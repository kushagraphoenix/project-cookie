<svg
    xmlns="http://www.w3.org/2000/svg"
    width="900"
    height="1200"
    viewBox="0 0 900 1200"
>

    <defs>

        <!-- Paper Gradient -->
        <linearGradient id="paperGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFFDF8"/>
            <stop offset="100%" stop-color="#F8F1E5"/>
        </linearGradient>

        <!-- Soft Shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow
                dx="0"
                dy="12"
                stdDeviation="18"
                flood-color="#000000"
                flood-opacity="0.18"/>
        </filter>

        <!-- Paper Texture -->
        <filter id="paperNoise">
            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.9"
                numOctaves="2"
                seed="12"
                result="noise"/>
            <feColorMatrix
                type="saturate"
                values="0"/>
            <feComponentTransfer>
                <feFuncA
                    type="table"
                    tableValues="0 0.025"/>
            </feComponentTransfer>
        </filter>

    </defs>

    <!-- Shadow -->
    <rect
        x="40"
        y="40"
        width="820"
        height="1120"
        rx="28"
        fill="#000"
        opacity="0.05"/>

    <!-- Paper -->
    <rect
        x="30"
        y="30"
        width="840"
        height="1140"
        rx="28"
        fill="url(#paperGradient)"
        filter="url(#shadow)"/>

    <!-- Border -->
    <rect
        x="52"
        y="52"
        width="796"
        height="1096"
        rx="18"
        fill="none"
        stroke="#DDD5C8"
        stroke-width="2"/>

    <!-- Fold Line -->
    <line
        x1="450"
        y1="70"
        x2="450"
        y2="1130"
        stroke="#ECE6DA"
        stroke-width="2"
        opacity="0.35"/>

    <!-- Texture -->
    <rect
        x="30"
        y="30"
        width="840"
        height="1140"
        rx="28"
        filter="url(#paperNoise)"
        opacity="0.35"/>

</svg>